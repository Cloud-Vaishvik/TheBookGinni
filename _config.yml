# GitHub Pages configuration for TheBookGinni

theme: null

title: TheBookGinni
description: A universal AI-powered book assistant that answers questions strictly from your uploaded books — supports any language including Hindi, French, Spanish, Arabic, and more.
url: ""

# Serve index.html as the root page
include:
  - index.html

# Exclude files that shouldn't be published
